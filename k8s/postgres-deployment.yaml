apiVersion: apps/v1
kind: Deployment
metadata:
  name: prept-postgres
  namespace: prept
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prept-postgres
  template:
    metadata:
      labels:
        app: prept-postgres
    spec:
      containers:
        - name: postgres
          image: postgres:15-alpine
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_DB
              value: prepttracker
            - name: POSTGRES_USER
              valueFrom:
                configMapKeyRef:
                  name: prept-config
                  key: DATABASE_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: prept-secret
                  key: DATABASE_PASSWORD
          volumeMounts:
            - name: postgres-storage
              mountPath: /var/lib/postgresql/data
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
      volumes:
        - name: postgres-storage
          persistentVolumeClaim:
            claimName: postgres-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: prept-postgres
  namespace: prept
spec:
  selector:
    app: prept-postgres
  ports:
    - port: 5432
      targetPort: 5432
