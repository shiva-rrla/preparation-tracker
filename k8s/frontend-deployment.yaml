apiVersion: apps/v1
kind: Deployment
metadata:
  name: prept-frontend
  namespace: prept
spec:
  replicas: 2
  selector:
    matchLabels:
      app: prept-frontend
  template:
    metadata:
      labels:
        app: prept-frontend
    spec:
      containers:
        - name: frontend
          image: prept-frontend:latest
          ports:
            - containerPort: 80
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "200m"
---
apiVersion: v1
kind: Service
metadata:
  name: prept-frontend
  namespace: prept
spec:
  selector:
    app: prept-frontend
  ports:
    - port: 80
      targetPort: 80
