apiVersion: apps/v1
kind: Deployment
metadata:
  name: prept-backend
  namespace: prept
spec:
  replicas: 2
  selector:
    matchLabels:
      app: prept-backend
  template:
    metadata:
      labels:
        app: prept-backend
    spec:
      containers:
        - name: backend
          image: prept-backend:latest
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: prept-config
          env:
            - name: DATABASE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: prept-secret
                  key: DATABASE_PASSWORD
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: prept-secret
                  key: JWT_SECRET
          resources:
            requests:
              memory: "512Mi"
              cpu: "500m"
            limits:
              memory: "1Gi"
              cpu: "1000m"
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: prept-backend
  namespace: prept
spec:
  selector:
    app: prept-backend
  ports:
    - port: 8080
      targetPort: 8080
